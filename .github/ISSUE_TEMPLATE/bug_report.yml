name: Bug Report
description: Something isn't working as expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: device
    attributes:
      label: Device
      description: Which Line 6 device were you using?
      placeholder: e.g. HX Stomp XL
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Device Firmware Version
      placeholder: e.g. 3.70
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 24.04, macOS 14.5, Windows 11
    validations:
      required: true

  - type: input
    id: openhx_version
    attributes:
      label: OpenHX Version
      placeholder: e.g. 0.2.0 or commit SHA
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `openhx presets list`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant terminal output here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant (USB hub, VM, etc.).
    validations:
      required: false
